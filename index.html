<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f3e4c8">
<title>Dress-Up Debbie — Paper Dolls</title>
<style>
  :root{
    --paper:#f6e8cd;
    --paper-2:#efd9b4;
    --ink:#4a3a2c;
    --rose:#c76b6b;
    --rose-dk:#a84f4f;
    --mint:#7fae9a;
    --gold:#cf9d54;
    --shadow:rgba(74,58,44,.22);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:"Georgia","Times New Roman",serif;
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 50% -10%, #fff6e6 0%, var(--paper) 55%, var(--paper-2) 100%);
    /* lock the page so the doll can't be scrolled/zoomed on mobile */
    position:fixed; inset:0; overflow:hidden;
    touch-action:none; user-select:none; -webkit-user-select:none;
  }
  /* faint vintage paper speckle */
  body::before{
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background-image:radial-gradient(rgba(120,90,50,.10) 1px, transparent 1.4px);
    background-size:7px 7px;
  }

  #app{
    position:relative; height:100%;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  header{ text-align:center; padding:10px 12px 4px; flex:0 0 auto; }
  header h1{
    margin:0; font-family:"Brush Script MT","Segoe Script",cursive,"Georgia",serif;
    font-size:clamp(28px,8vw,46px); line-height:1; letter-spacing:.5px;
    color:var(--rose-dk);
    text-shadow:1px 2px 0 #fff, 2px 4px 0 var(--shadow);
  }
  header .sub{
    margin:4px 0 0; font-size:clamp(12px,3.4vw,15px); font-style:italic;
    color:var(--ink); opacity:.8;
  }

  #stage{ position:relative; flex:1 1 auto; min-height:0; display:flex;
          align-items:center; justify-content:center; }

  /* the doll + worn-clothes box. every layer is object-fit:contain in the SAME
     box, so a coat drawn here lands exactly on the doll. */
  .doll-stage{
    position:relative; height:100%; width:100%;
    max-width:min(94vw, 62vh);   /* keep the doll a pleasant portrait shape */
    margin:0 auto;
    filter:drop-shadow(0 8px 10px var(--shadow));
    cursor:pointer;
  }
  .layer{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:contain; pointer-events:none;
    image-rendering:auto;
  }
  .worn{ animation:pop .22s ease-out; }
  @keyframes pop{ 0%{ transform:scale(1.04); } 100%{ transform:scale(1); } }

  /* glow ring shown when an outfit is hovering over the doll, ready to snap */
  .snap-ring{
    position:absolute; left:8%; top:6%; right:8%; bottom:6%;
    border:3px dashed var(--mint); border-radius:24px;
    opacity:0; transform:scale(.96); transition:opacity .15s, transform .15s;
    pointer-events:none;
    box-shadow:0 0 0 6px rgba(127,174,154,.18), inset 0 0 30px rgba(127,174,154,.25);
  }
  .doll-stage.snap-ready .snap-ring{ opacity:1; transform:scale(1); }

  /* ---- the wardrobe tray ---- */
  #tray-wrap{ flex:0 0 auto; padding:6px 6px max(8px,env(safe-area-inset-bottom)); }
  #tray-label{
    text-align:center; font-style:italic; font-size:13px; opacity:.7; margin:0 0 4px;
  }
  #tray{
    display:flex; gap:8px; justify-content:center; align-items:stretch;
    overflow-x:auto; padding:8px 6px 10px; scrollbar-width:none;
    background:linear-gradient(#e7d3ac,#dcc295);
    border-radius:16px;
    box-shadow:inset 0 2px 6px rgba(74,58,44,.25), 0 -1px 0 #fff;
    border:1px solid rgba(74,58,44,.18);
  }
  #tray::-webkit-scrollbar{ display:none; }
  .tray-item{
    flex:0 0 auto; width:clamp(70px,21vw,98px);
    display:flex; flex-direction:column; align-items:center; gap:2px;
    background:linear-gradient(#fffdf6,#fbf2dd);
    border:1px solid rgba(74,58,44,.22);
    border-radius:12px; padding:6px 5px 5px;
    box-shadow:0 2px 4px var(--shadow);
    cursor:grab; touch-action:none;
    transition:transform .12s ease, box-shadow .12s ease;
    font-family:inherit; color:var(--ink);
  }
  .tray-item:active{ cursor:grabbing; transform:translateY(1px) scale(.98); }
  .tray-item.worn{
    outline:2px solid var(--mint); outline-offset:1px;
    box-shadow:0 0 0 4px rgba(127,174,154,.25), 0 2px 4px var(--shadow);
  }
  .tray-item .thumb{ width:100%; height:auto; aspect-ratio:3/4; display:block; }
  .tray-item .nm{ font-size:11px; line-height:1.1; text-align:center; font-style:italic; }

  /* the big garment that follows your finger while dragging */
  .drag-clone{
    position:fixed; left:0; top:0; z-index:50;
    object-fit:contain; pointer-events:none; will-change:transform;
    filter:drop-shadow(0 10px 14px rgba(74,58,44,.35));
    transform-origin:center;
  }
  .drag-clone.lift{ animation:lift .14s ease-out; }
  @keyframes lift{ from{ opacity:.4; } to{ opacity:1; } }

  /* toast message */
  #toast{
    position:absolute; left:50%; bottom:14px; transform:translate(-50%,12px);
    background:var(--ink); color:#fff8ea; font-style:italic; font-size:14px;
    padding:8px 16px; border-radius:999px; opacity:0; pointer-events:none;
    transition:opacity .2s, transform .2s; z-index:60; white-space:nowrap;
    box-shadow:0 4px 12px var(--shadow);
  }
  #toast.show{ opacity:1; transform:translate(-50%,0); }

  /* undress hint button */
  #undress{
    position:absolute; top:8px; right:10px; z-index:40;
    font-family:inherit; font-style:italic; font-size:13px;
    background:#fffdf6; color:var(--rose-dk);
    border:1px solid rgba(74,58,44,.25); border-radius:999px;
    padding:6px 12px; box-shadow:0 2px 4px var(--shadow);
    opacity:0; pointer-events:none; transition:opacity .2s; cursor:pointer;
  }
  #app.dressed #undress{ opacity:1; pointer-events:auto; }

  /* sparkle burst on snap */
  .spark{ position:fixed; z-index:55; font-size:20px; pointer-events:none;
          animation:spark .7s ease-out forwards; }
  @keyframes spark{
    0%{ transform:translate(-50%,-50%) scale(.4); opacity:0; }
    25%{ opacity:1; }
    100%{ transform:translate(var(--dx),var(--dy)) scale(1.1); opacity:0; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Dress-Up&nbsp;Debbie</h1>
    <p class="sub">drag an outfit onto the doll — it snaps right on!</p>
  </header>

  <div id="stage">
    <button id="undress" type="button">👚 take it off</button>
    <div class="doll-stage" id="dollStage">
      <img class="layer doll" src="Assets/dollA.png" alt="Paper doll Debbie">
      <img class="layer worn" id="wornLayer" alt="" hidden>
      <div class="snap-ring"></div>
    </div>
  </div>

  <div id="tray-wrap">
    <p id="tray-label">✁ Debbie's Wardrobe ✁</p>
    <div id="tray"></div>
  </div>

  <div id="toast"></div>
</div>

<script>
/* =========================================================================
   DRESS-UP DEBBIE — a vintage paper-doll dress-up toy
   Every outfit PNG shares the doll's canvas and is pre-aligned to her body,
   so a coat painted into the doll's box (object-fit:contain) lands perfectly.
   The game: drag an outfit out of the wardrobe and drop it on the doll; it
   snaps exactly into place. Tap the doll (or "take it off") to undress.
   ========================================================================= */

const A = 'Assets/';
const OUTFITS = [
  { id:'coat1', src:A+'dollACoat1.png', name:'Fuzzy Coat'  },
  { id:'coat2', src:A+'dollACoat2.png', name:'Pea Coat'    },
  { id:'coat3', src:A+'dollACoat3.png', name:'Rose Dress'  },
  { id:'coat4', src:A+'dollACoat4.png', name:'Red Suit'    },
];

const dollStage = document.getElementById('dollStage');
const wornLayer = document.getElementById('wornLayer');
const tray      = document.getElementById('tray');
const app       = document.getElementById('app');
const toastEl   = document.getElementById('toast');
const undressBtn= document.getElementById('undress');

let currentWorn = null;

/* ---------- build the wardrobe tray ---------- */
const itemEls = {};
for(const o of OUTFITS){
  const btn = document.createElement('button');
  btn.className = 'tray-item';
  btn.type = 'button';
  btn.dataset.id = o.id;
  const cv = document.createElement('canvas');
  cv.className = 'thumb'; cv.width = 240; cv.height = 320;
  const nm = document.createElement('span');
  nm.className = 'nm'; nm.textContent = o.name;
  btn.append(cv, nm);
  tray.appendChild(btn);
  itemEls[o.id] = btn;

  // preload the full image (used for both the thumbnail and the drag clone)
  const img = new Image();
  img.onload = () => { o.img = img; renderThumb(cv, img); };
  img.src = o.src;

  btn.addEventListener('pointerdown', e => startDrag(e, o));
}

/* ---------- thumbnail: trim transparent margins for a tidy little preview.
   Falls back to the whole canvas if pixels can't be read (e.g. file:// CORS). */
function renderThumb(canvas, img){
  const crop = trimBounds(img);
  const cx = canvas.getContext('2d');
  cx.clearRect(0,0,canvas.width,canvas.height);
  const sx = crop?crop.x:0, sy = crop?crop.y:0,
        sw = crop?crop.w:img.naturalWidth, sh = crop?crop.h:img.naturalHeight;
  const s = Math.min(canvas.width/sw, canvas.height/sh) * 0.94;
  const dw = sw*s, dh = sh*s;
  cx.drawImage(img, sx,sy,sw,sh, (canvas.width-dw)/2, (canvas.height-dh)/2, dw, dh);
}
function trimBounds(img){
  try{
    const max = 150;
    const sc  = Math.min(max/img.naturalWidth, max/img.naturalHeight);
    const w = Math.max(1,Math.round(img.naturalWidth*sc));
    const h = Math.max(1,Math.round(img.naturalHeight*sc));
    const oc = document.createElement('canvas'); oc.width=w; oc.height=h;
    const oct = oc.getContext('2d'); oct.drawImage(img,0,0,w,h);
    const d = oct.getImageData(0,0,w,h).data;
    let minX=w, minY=h, maxX=0, maxY=0, found=false;
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      if(d[(y*w+x)*4+3] > 14){ found=true;
        if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; }
    }
    if(!found) return null;
    const pad=3;
    minX=Math.max(0,minX-pad); minY=Math.max(0,minY-pad);
    maxX=Math.min(w-1,maxX+pad); maxY=Math.min(h-1,maxY+pad);
    return { x:minX/sc, y:minY/sc, w:(maxX-minX+1)/sc, h:(maxY-minY+1)/sc };
  }catch(e){ return null; }   // tainted canvas -> just show the full image
}

/* ---------- drag & snap ---------- */
let drag = null;

function startDrag(e, outfit){
  if(!outfit.img) return;            // not loaded yet
  e.preventDefault();
  const r = dollStage.getBoundingClientRect();
  const el = document.createElement('img');
  el.src = outfit.src;
  el.className = 'drag-clone lift';
  el.style.width  = r.width + 'px';
  el.style.height = r.height + 'px';
  document.body.appendChild(el);
  drag = { el, outfit, w:r.width, h:r.height, rect:r, snap:false };
  moveDrag(e.clientX, e.clientY);
  try{ e.target.setPointerCapture(e.pointerId); }catch(_){}
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup',   onUp);
  window.addEventListener('pointercancel', onUp);
}

function moveDrag(cx, cy){
  drag.el.style.transform = `translate(${cx - drag.w/2}px, ${cy - drag.h/2}px)`;
}

function onMove(e){
  if(!drag) return;
  moveDrag(e.clientX, e.clientY);
  const r = drag.rect;
  const pad = Math.max(40, r.width * 0.5);   // generous, kid-friendly snap zone
  const near = e.clientX > r.left-pad && e.clientX < r.right+pad &&
               e.clientY > r.top-pad  && e.clientY < r.bottom+pad;
  if(near !== drag.snap){
    drag.snap = near;
    dollStage.classList.toggle('snap-ready', near);
  }
}

function onUp(){
  if(!drag) return;
  window.removeEventListener('pointermove', onMove);
  window.removeEventListener('pointerup',   onUp);
  window.removeEventListener('pointercancel', onUp);
  dollStage.classList.remove('snap-ready');
  const d = drag; drag = null;

  if(d.snap){
    // glide the garment onto the doll's exact box, then commit it as "worn"
    const r = d.rect;
    d.el.style.transition = 'transform .18s cubic-bezier(.2,.9,.3,1.2)';
    d.el.style.transform  = `translate(${r.left}px, ${r.top}px)`;
    let done = false;
    const finish = () => {
      if(done) return; done = true;
      wear(d.outfit);
      d.el.remove();
      sparkle(r.left + r.width/2, r.top + r.height*0.42);
    };
    d.el.addEventListener('transitionend', finish, { once:true });
    setTimeout(finish, 240);   // safety net if transitionend doesn't fire
  } else {
    // dropped in empty space — fade it away
    d.el.style.transition = 'opacity .2s ease, transform .2s ease';
    d.el.style.opacity = '0';
    setTimeout(() => d.el.remove(), 220);
  }
}

function wear(outfit){
  wornLayer.src = outfit.src;
  wornLayer.hidden = false;
  // restart the little pop animation
  wornLayer.style.animation = 'none'; void wornLayer.offsetWidth;
  wornLayer.style.animation = '';
  currentWorn = outfit.id;
  app.classList.add('dressed');
  markWorn();
  toast(outfit.name + ' looks lovely! 💃');
}

function undress(){
  if(!currentWorn) return;
  wornLayer.hidden = true;
  wornLayer.removeAttribute('src');
  currentWorn = null;
  app.classList.remove('dressed');
  markWorn();
  toast('All bundled off! 🧺');
}

function markWorn(){
  for(const id in itemEls) itemEls[id].classList.toggle('worn', id === currentWorn);
}

// tap the doll to take the current outfit off
dollStage.addEventListener('click', () => { if(currentWorn) undress(); });
undressBtn.addEventListener('click', undress);

/* ---------- little flourishes ---------- */
let toastT;
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => toastEl.classList.remove('show'), 1700);
}

function sparkle(x, y){
  const marks = ['✨','💫','⭐','🌸'];
  for(let i=0;i<7;i++){
    const s = document.createElement('span');
    s.className = 'spark';
    s.textContent = marks[i % marks.length];
    s.style.left = x + 'px'; s.style.top = y + 'px';
    const ang = (Math.PI*2) * (i/7) + Math.random()*0.6;
    const dist = 50 + Math.random()*40;
    s.style.setProperty('--dx', Math.cos(ang)*dist + 'px');
    s.style.setProperty('--dy', (Math.sin(ang)*dist - 20) + 'px');
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 750);
  }
}

/* keep drag clones the right size if the device rotates */
window.addEventListener('resize', () => { if(drag) onUp(); });
</script>
</body>
</html>
